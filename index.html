<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Human 101 — how to be a person when AI can do everything</title>
<meta name="description" content="A tiny tutorial for staying human in the AI era. Copy-paste prompts and example conversations, organized by who you are." />
<style>
  :root {
    --bg: #f7f4ee;
    --panel: #fffdf8;
    --ink: #1a1714;
    --ink-soft: #5a544c;
    --line: #e6dfd2;
    --accent: #c2410c;
    --accent-soft: #fde7d8;
    --you-bubble: #1a1714;
    --you-ink: #fffdf8;
    --ai-bubble: #f1ebdc;
    --ai-ink: #1a1714;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }
  /* sidebar */
  aside {
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: 28px 22px 60px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  aside .brand {
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.02em;
    margin: 0 0 4px;
  }
  aside .brand-sub {
    color: var(--ink-soft);
    font-size: 13px;
    margin: 0 0 8px;
  }
  aside .brand-hint {
    color: var(--ink-soft);
    font-size: 12px;
    margin: 0 0 24px;
    font-style: italic;
  }
  .domain { margin-bottom: 22px; }
  .domain h3 {
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    margin: 0 0 8px;
    font-weight: 700;
  }
  .domain ul { list-style: none; padding: 0; margin: 0; }
  .domain li {
    padding: 6px 10px;
    margin: 2px 0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    color: var(--ink);
    transition: background 0.1s;
  }
  .domain li:hover { background: var(--accent-soft); }
  .domain li.active {
    background: var(--accent);
    color: var(--panel);
    font-weight: 600;
  }
  /* main */
  main {
    padding: 56px 64px 120px;
    max-width: 760px;
    width: 100%;
  }
  .crumb {
    color: var(--ink-soft);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 0 0 6px;
  }
  h1 {
    font-size: 36px;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin: 0 0 18px;
    font-weight: 800;
  }
  .why {
    color: var(--ink-soft);
    font-size: 17px;
    margin: 0 0 32px;
    max-width: 60ch;
  }
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    font-weight: 700;
    margin: 36px 0 10px;
  }
  /* prompt card */
  .prompt {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 14.5px;
    white-space: pre-wrap;
    color: var(--ink);
  }
  .copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink-soft);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .copy-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-soft); }
  .copy-btn.copied { background: var(--accent); color: var(--panel); border-color: var(--accent); }
  /* conversation */
  .convo { display: flex; flex-direction: column; gap: 14px; margin-top: 12px; }
  .turn { display: flex; flex-direction: column; max-width: 78%; }
  .turn.you { align-self: flex-end; align-items: flex-end; }
  .turn.ai  { align-self: flex-start; align-items: flex-start; }
  .role {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    margin: 0 6px 4px;
    font-weight: 700;
  }
  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .you .bubble { background: var(--you-bubble); color: var(--you-ink); border-bottom-right-radius: 4px; }
  .ai  .bubble { background: var(--ai-bubble);  color: var(--ai-ink);  border-bottom-left-radius: 4px; }
  .takeaway {
    margin-top: 36px;
    padding: 16px 20px;
    border-left: 3px solid var(--accent);
    background: var(--accent-soft);
    border-radius: 0 8px 8px 0;
    font-size: 15px;
    color: var(--ink);
  }
  .takeaway strong { color: var(--accent); }
  /* footer */
  footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    color: var(--ink-soft);
    font-size: 13px;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
  /* mobile */
  .menu-btn {
    display: none;
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 20;
    background: var(--ink);
    color: var(--panel);
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  @media (max-width: 820px) {
    .layout { grid-template-columns: 1fr; }
    aside {
      position: fixed;
      inset: 0 30% 0 0;
      z-index: 15;
      transform: translateX(-100%);
      transition: transform 0.2s;
      box-shadow: 4px 0 16px rgba(0,0,0,0.08);
    }
    aside.open { transform: translateX(0); }
    main { padding: 64px 22px 80px; }
    h1 { font-size: 28px; }
    .menu-btn { display: block; }
  }
</style>
</head>
<body>
<button class="menu-btn" id="menuBtn">Menu</button>
<div class="layout">
  <aside id="sidebar">
    <p class="brand">Human 101</p>
    <p class="brand-sub">Staying a person when the AI can do everything.</p>
    <p class="brand-hint">Pick the background that's closest to you.</p>
    <nav id="nav"></nav>
  </aside>
  <main id="main"></main>
</div>

<script>
const SKILLS = [
  {
    domain: "Students",
    skills: [
      {
        id: "right-level",
        name: "Get an explanation at your level",
        why: "Most explanations are pitched too high or too low. Tell AI exactly what you do and don't know — not 'explain like I'm 5,' but 'I know X, I don't know Y.'",
        prompt: "I know [these things] about [topic]. I get confused at [the specific point]. Explain [what you need] starting from where I actually am, and stop after one paragraph so I can ask follow-ups.",
        convo: [
          { role: "you", text: "I know what derivatives are and the basic chain rule. I get confused when there are nested functions inside a product. Walk me through how to handle that, starting from where I am, one paragraph at a time." },
          { role: "ai", text: "Right — when you have something like (x²·sin(3x))', do product rule first and treat each piece as its own object. The first piece (x²) is easy. The second piece sin(3x) is where chain rule lives — its derivative is cos(3x)·3, not just cos(3x). Product rule then glues them: (x²)'·sin(3x) + x²·(sin(3x))'. Want a worked example, or just more on the chain-rule-inside step?" },
          { role: "you", text: "Just the chain-rule-inside step." }
        ],
        takeaway: "'I don't get it' is rarely true. 'I don't get the part where X meets Y' almost always is. Finding that sentence is half the work."
      },
      {
        id: "study-without-cheating",
        name: "Study without cheating yourself",
        why: "AI can do your problem set. It can also be the smartest study buddy you've ever had. The difference is who's doing the thinking.",
        prompt: "I'm studying [topic]. Don't give me the answer. Give me a problem at my level, then tell me only whether my answer is right or wrong — explain only after I've tried twice.",
        convo: [
          { role: "you", text: "Studying linked lists. Give me a problem at my level. Don't explain unless I miss it twice." },
          { role: "ai", text: "Problem: given the head of a singly linked list, return a new list with every other node removed (keep the 1st, 3rd, 5th, ...). Take your shot." },
          { role: "you", text: "Walk through with a pointer, set current.next = current.next.next, advance current to current.next." },
          { role: "ai", text: "Right idea. Edge cases?" },
          { role: "you", text: "Empty list? List of length 1?" },
          { role: "ai", text: "Both important. There's a third you missed." }
        ],
        takeaway: "AI doing your homework feels great in the moment and rots you in the long run. Sparring partner, not ghostwriter."
      },
      {
        id: "write-paper-voice",
        name: "Write a paper without losing your voice",
        why: "It's tempting to let AI rewrite your draft. The version that comes back is fluent and not yours — and professors notice.",
        prompt: "Here's a paragraph from my draft: [paragraph]. Don't rewrite it. Tell me which sentence is the weakest and why — I'll fix it myself.",
        convo: [
          { role: "you", text: "Paragraph: 'Climate change is a major issue facing the world today. It causes many problems. We need to do something about it.' Which sentence is weakest and why?" },
          { role: "ai", text: "All three are weak for the same reason — too general to commit to anything. The worst is the second ('It causes many problems'), because it's the one where you had a chance to be specific and chose not to. Pick one problem you actually care about and write that sentence." }
        ],
        takeaway: "AI can identify what's weak. You should be the one who fixes it. That's how the writing stays yours."
      },
      {
        id: "translate-feedback",
        name: "Translate confusing professor feedback",
        why: "'Tighten this' and 'needs more depth' are not instructions — they're emotions in shorthand. AI is good at decoding.",
        prompt: "My professor wrote [the comment] on my draft. Give me three things they might actually mean by that, with one example fix for each.",
        convo: [
          { role: "you", text: "Professor wrote 'this needs more nuance' on my conclusion. Three things they might actually mean." },
          { role: "ai", text: "1. 'You're treating both sides as equally valid' — try acknowledging that one side has more evidence.\n2. 'You're treating both sides as opposite when they overlap' — name the overlap.\n3. 'You picked a side too early and ignored the strongest objection' — steelman the opposing view in one sentence before concluding.\n\nWhich feels closest to your actual conclusion?" }
        ],
        takeaway: "Most professor comments are compressed. Decompressing them is half the revision."
      }
    ]
  },

  {
    domain: "Job seekers",
    skills: [
      {
        id: "tailor-resume",
        name: "Tailor your resume without lying",
        why: "The temptation is to rewrite history. The skill is to surface the version of your real history that maps to this job.",
        prompt: "Here's the job description: [paste]. Here are five real things I've done: [list]. Tell me which of my real experiences map to which requirement, and rewrite each as one resume bullet — without inventing anything.",
        convo: [
          { role: "you", text: "Job: 'Need someone who can ship features end to end and work with PMs.' Real things: 1) led the migration of our auth flow, 2) ran a weekly sync with product, 3) wrote our deploy doc, 4) onboarded two new engineers, 5) shipped a billing dashboard nobody asked for that finance loved. Map them and rewrite. Nothing invented." },
          { role: "ai", text: "Mapping (no invention):\n• 'Ship features end to end' → #5. Bullet: 'Identified an unstated finance need, designed and shipped a billing dashboard now used weekly by the finance team.'\n• 'Work with PMs' → #2. Bullet: 'Ran a weekly product sync to align engineering priorities with PM roadmap.'\n• Bonus end-to-end → #1. Bullet: 'Led the migration of the team's auth flow from design through rollout.'\n• #3 and #4 don't map to this JD. Save them for a different role." }
        ],
        takeaway: "Tailoring is sorting and translation, not fabrication. AI sorts. You provide the truth."
      },
      {
        id: "interview-practice",
        name: "Practice for the interview",
        why: "Reading interview tips doesn't help. Saying the words out loud — even to AI — does.",
        prompt: "Pretend you're interviewing me for [role]. Ask me one question, wait for my answer, then tell me what was strong and what was weak in my response. Then ask the next.",
        convo: [
          { role: "ai", text: "Tell me about a time you delivered hard feedback to someone more senior than you." },
          { role: "you", text: "When I noticed a teammate's PR had a security issue, I sent them a private message instead of leaving a public comment, and we talked it through. They fixed it before merge." },
          { role: "ai", text: "Strong: you named the choice you made (private vs. public) and gave a concrete outcome.\nWeak: 'more senior' was the question, but you said 'teammate.' Did you actually answer the seniority part? If yes, name it. If no, you have a different example you should use instead." }
        ],
        takeaway: "Interviews are improvisation under pressure. The fix isn't more reading — it's reps."
      },
      {
        id: "awkward-followup",
        name: "Draft the awkward follow-up email",
        why: "The email you've been putting off for three weeks gets harder each day. Outsource the first draft.",
        prompt: "I need to email [person] about [thing]. It's been [how long] and I feel weird about it. Draft it short, no over-explaining the silence, one clear ask.",
        convo: [
          { role: "you", text: "Email a recruiter I never replied to two months ago. Role's probably gone but I want to stay in touch. Short, no over-explaining, one ask." },
          { role: "ai", text: "Subject: belatedly\n\nHi [Name] — I dropped the ball on getting back to you, sorry about that. I'd still love to stay on your radar for similar roles down the line. Open to a 15-min call whenever's convenient.\n\nBest,\n[You]" },
          { role: "you", text: "That's exactly the level. Sending." }
        ],
        takeaway: "The email isn't hard. The shame is hard. Bypass it by editing a draft instead of staring at a blank page."
      },
      {
        id: "negotiate-offer",
        name: "Negotiate the offer",
        why: "Negotiation feels like confrontation. It's not — it's a conversation with a script. Rehearse the script.",
        prompt: "I got an offer for [details]. Roleplay the recruiter — I'll counter, you respond as they realistically would, and we'll go a few turns. Then tell me what I should adjust in real life.",
        convo: [
          { role: "you", text: "Offer: $140k base, $20k bonus, no signing. My target was $160k base. Roleplay the recruiter." },
          { role: "ai", text: "(as recruiter) Hey, wanted to follow up on the offer — what's your reaction?" },
          { role: "you", text: "Excited but the base is below where I was hoping — closer to $160k would feel right." },
          { role: "ai", text: "(as recruiter) I hear you. The band is what it is, but I have flexibility on signing bonus. Could a $15k signing close the gap?" },
          { role: "you", text: "I'd want $20k signing and we can close today." },
          { role: "ai", text: "(out of role) Adjustment for real life: don't volunteer 'we can close today' before they make a final move. That's your last card — hold it." }
        ],
        takeaway: "Most negotiation anxiety is unfamiliarity. Run the script three times in private and the real one feels like a rerun."
      }
    ]
  },

  {
    domain: "Writers & creatives",
    skills: [
      {
        id: "real-opening",
        name: "Find your draft's real opening",
        why: "Your first paragraph is almost never the right first paragraph. It's the warm-up.",
        prompt: "Here's my draft: [paste]. Don't edit. Tell me which paragraph I should consider as the actual opening, and why.",
        convo: [
          { role: "you", text: "Here's my draft. Which paragraph might actually be the opening?" },
          { role: "ai", text: "Paragraph 4. Your first three are throat-clearing — 'in this essay I will,' background context, scene-setting. Paragraph 4 starts 'My grandmother stopped recognizing me on a Wednesday.' That's the moment your reader leans in. Everything before it is for you, not them." },
          { role: "you", text: "Yeah. I knew that and was hoping you'd disagree." },
          { role: "ai", text: "I won't." }
        ],
        takeaway: "Writers warm up on the page. The job of editing is to delete the warm-up."
      },
      {
        id: "kill-darling",
        name: "Kill the wrong darling",
        why: "You can usually feel which sentence is too pleased with itself. AI can confirm.",
        prompt: "Here are three sentences I'm proud of from my draft: [list]. One of them is hurting the piece. Tell me which and why.",
        convo: [
          { role: "you", text: "Three sentences I love:\n1. 'She held the photograph the way you hold a hand.'\n2. 'The kitchen was quieter than she remembered, or maybe she was louder.'\n3. 'Grief, it turned out, was just love with nowhere to go.'\n\nWhich is hurting the piece?" },
          { role: "ai", text: "#3. The first two are observations only your narrator could make. The third is a line you've heard before — a tweet-ready aphorism that flattens what came before it into a quote-card. Cut it and the piece gets sadder, which is what you wanted." }
        ],
        takeaway: "The sentences that feel like they belong on a poster usually do — to the detriment of the piece they're in."
      },
      {
        id: "honest-feedback",
        name: "Get feedback that's actually useful",
        why: "AI defaults to encouragement. You have to ask, specifically and on purpose, for the kind that helps.",
        prompt: "Read [piece]. Don't tell me what's good. Tell me what a smart, kind editor would circle in red, in one sentence each, no more than three.",
        convo: [
          { role: "you", text: "Read this piece. Three things a smart kind editor would circle in red. One sentence each." },
          { role: "ai", text: "1. The middle section repeats the thesis three times — your reader got it the first time.\n2. The ending earns its emotion, but the second-to-last paragraph undercuts it by explaining what the ending is about to do.\n3. You use 'just' nine times. Three of them are doing real work; six are softening sentences that don't need softening." }
        ],
        takeaway: "AI is a polite reader by default. Ask for the editor and you get someone useful."
      },
      {
        id: "name-the-thing",
        name: "Name the thing",
        why: "Naming is hard because the right name has to do four things at once. AI is good at generating candidates that show you the dimensions you didn't know you cared about.",
        prompt: "I need to name [thing]. It does [function]. The vibe should be [vibe]. Give me 10 candidates including 3 deliberately bad ones — the bad ones help me see what I'm avoiding.",
        convo: [
          { role: "you", text: "Naming a journaling app. Daily one-question prompts. Vibe: warm, slightly playful, not therapeutic. 10 candidates, 3 deliberately bad." },
          { role: "ai", text: "1. Asked\n2. Today's Question\n3. One Thing\n4. Pondering\n5. Daily\n6. The Prompt\n7. Hi Again\n8. Bad: ReflectAI\n9. Bad: MindfulMe\n10. Bad: JournaLite" },
          { role: "you", text: "I hate 8 and 9 the most, which means I really don't want this to feel like a wellness app. Good to know." }
        ],
        takeaway: "The names you reject teach you what you actually want — sometimes more than the names you accept."
      }
    ]
  },

  {
    domain: "Engineers",
    skills: [
      {
        id: "debug-together",
        name: "Debug together",
        why: "Half of debugging is reconstructing the assumption you didn't know you made. Saying it out loud — even to AI — surfaces it.",
        prompt: "Bug: [what's happening]. Expected: [what should happen]. What I've tried: [list]. Don't suggest fixes yet. Ask me three questions that test the assumptions I might be making.",
        convo: [
          { role: "you", text: "Bug: API returns 200 but response body is empty. Expected: JSON payload. Tried: checked the controller returns the right object, added logging, tested in Postman (same result). Three questions about my assumptions." },
          { role: "ai", text: "1. Are you sure the controller is the one being hit? Could a middleware be short-circuiting after auth and returning 200 with empty body?\n2. When you 'tested in Postman,' was the request identical to the failing one — same headers, same content-type?\n3. Is there a serialization layer (response interceptor, DTO mapper) between your controller's return and the wire that could be silently dropping fields?" },
          { role: "you", text: "Oh. The interceptor. I forgot we added one." }
        ],
        takeaway: "The bug is rarely where you're looking. It's where you assumed you didn't need to look. Questions beat suggestions."
      },
      {
        id: "self-pr-review",
        name: "Review your own PR",
        why: "After 90 minutes of staring at your code, you can't see it. AI can — and will catch what your reviewer would catch, before they do.",
        prompt: "Here's my diff: [paste]. Review it the way a careful senior engineer would. Focus on things I'd be embarrassed by, not nitpicks.",
        convo: [
          { role: "you", text: "Here's my diff. Review like a careful senior. Things I'd be embarrassed by, not nitpicks." },
          { role: "ai", text: "Three things:\n1. The new function `updateUser` swallows errors with a try/except that just `pass`. That'll bite someone in production.\n2. You added a database call inside a loop. For a 10-row list it's fine; for 10k it's a horror show. Comment at minimum, batch query at best.\n3. The test you added asserts the function returns truthy, not that it returns the right thing. It would pass even if the function returned `True` instead of the user object." }
        ],
        takeaway: "A 5-minute self-review with AI catches the comments your human reviewer would have left — without the social cost."
      },
      {
        id: "two-architectures",
        name: "Choose between two architectures",
        why: "The right architecture depends on which problems you'd rather have. Naming the problems is the actual decision.",
        prompt: "I'm choosing between [A] and [B] for [system]. Don't pick. Tell me what kind of problems each one will give me 18 months from now.",
        convo: [
          { role: "you", text: "Monolith vs. microservices for an early-stage product, team of 4. Don't pick. What problems does each give me at month 18?" },
          { role: "ai", text: "Monolith at month 18:\n• Slower deploys, larger blast radius, occasional 'who broke main' moments.\n• Tight coupling that makes it hard to extract a piece when you eventually want to.\n• Easier hiring, simpler ops, fewer 3am pages.\n\nMicroservices at month 18 with a team of 4:\n• You'll spend most engineering hours on infra (auth across services, observability, deploys, contract changes) instead of product.\n• Outages are subtler and harder to debug.\n• The 'scale teams independently' benefit doesn't apply at 4 people.\n\nMonolith problems are problems of growth. Microservices problems are problems you'd be inflicting on yourself." }
        ],
        takeaway: "There's no right architecture. There's just which set of problems you'd rather be solving in a year."
      },
      {
        id: "explain-non-engineer",
        name: "Explain your work to a non-engineer",
        why: "Most engineers explain by listing what they did. The skill is explaining what changed for the person who doesn't see code.",
        prompt: "I built [thing]. The audience is [non-technical role]. Don't list features. Tell me the one sentence that explains what's now possible that wasn't before.",
        convo: [
          { role: "you", text: "I built a caching layer for the recommendations endpoint. Audience is the head of product. One sentence — what's now possible that wasn't before." },
          { role: "ai", text: "The recommendations panel now loads in under 100ms instead of 1.5 seconds, which means we can put it on the homepage without making the homepage feel slow." },
          { role: "you", text: "That's the sentence." }
        ],
        takeaway: "'What I did' is for your changelog. 'What's now possible' is for everyone else."
      }
    ]
  },

  {
    domain: "Managers",
    skills: [
      {
        id: "hard-1on1",
        name: "Prep for a hard 1:1",
        why: "The conversation in your head goes well. The conversation in real life goes worse because you didn't rehearse the part where they push back.",
        prompt: "I need to tell [report] that [hard message]. Roleplay as them — push back the way they realistically would. We'll go three turns and then you tell me what I should adjust.",
        convo: [
          { role: "you", text: "Telling my report their work hasn't been at the level I expect for two months. Roleplay them. They tend to get defensive." },
          { role: "you", text: "(opening) I want to talk about how things have been going. I've noticed some of your recent work hasn't been at the level I know you can deliver." },
          { role: "ai", text: "(as report) Can you give me a specific example? Because I feel like I've been working really hard." },
          { role: "you", text: "The Q2 deck had errors I had to fix the morning of. The customer email last week needed two rounds of revision before it could go out." },
          { role: "ai", text: "(as report) Okay but the deck — you gave me the assignment the day before. And the email, I asked for feedback and you didn't get back to me until late." },
          { role: "ai", text: "(out of role) Real-life adjustment: they're going to redirect to your behavior, and they have a point. Don't get defensive back. Acknowledge the real constraint, then return to the pattern: 'You're right that the deck timeline was tight. The pattern I'm worried about is broader than any one deliverable — it's about ownership.' Keeps you out of tit-for-tat." }
        ],

  {

  {

const nav = document.getElementById("nav");
const main = document.getElementById("main");
const sidebar = document.getElementById("sidebar");
const menuBtn = document.getElementById("menuBtn");

let activeId = null;

function render() {
  // build nav
  nav.innerHTML = "";
  for (const d of SKILLS) {
    const wrap = document.createElement("div");
    wrap.className = "domain";
    const h = document.createElement("h3");
    h.textContent = d.domain;
    wrap.appendChild(h);
    const ul = document.createElement("ul");
    for (const s of d.skills) {
      const li = document.createElement("li");
      li.textContent = s.name;
      li.dataset.id = s.id;
      if (s.id === activeId) li.classList.add("active");
      li.addEventListener("click", () => {
        activeId = s.id;
        render();
        if (window.innerWidth <= 820) sidebar.classList.remove("open");
        history.replaceState(null, "", "#" + s.id);
        main.scrollTo({ top: 0, behavior: "instant" });
        window.scrollTo({ top: 0, behavior: "instant" });
      });
      ul.appendChild(li);
    }
    wrap.appendChild(ul);
    nav.appendChild(wrap);
  }
  // build main
  let active = null;
  let activeDomain = null;
  for (const d of SKILLS) for (const s of d.skills) {
    if (s.id === activeId) { active = s; activeDomain = d.domain; }
  }
  if (!active) { main.innerHTML = ""; return; }

  main.innerHTML = "";
  const crumb = document.createElement("p");
  crumb.className = "crumb";
  crumb.textContent = activeDomain;
  main.appendChild(crumb);

  const h1 = document.createElement("h1");
  h1.textContent = active.name;
  main.appendChild(h1);

  const why = document.createElement("p");
  why.className = "why";
  why.textContent = active.why;
  main.appendChild(why);

  const promptLabel = document.createElement("p");
  promptLabel.className = "section-label";
  promptLabel.textContent = "Try this prompt";
  main.appendChild(promptLabel);

  const promptBox = document.createElement("div");
  promptBox.className = "prompt";
  promptBox.textContent = active.prompt;
  const copyBtn = document.createElement("button");
  copyBtn.className = "copy-btn";
  copyBtn.textContent = "Copy";
  copyBtn.addEventListener("click", () => {
    navigator.clipboard.writeText(active.prompt).then(() => {
      copyBtn.textContent = "Copied";
      copyBtn.classList.add("copied");
      setTimeout(() => {
        copyBtn.textContent = "Copy";
        copyBtn.classList.remove("copied");
      }, 1400);
    });
  });
  promptBox.appendChild(copyBtn);
  main.appendChild(promptBox);

  const convoLabel = document.createElement("p");
  convoLabel.className = "section-label";
  convoLabel.textContent = "Example conversation";
  main.appendChild(convoLabel);

  const convo = document.createElement("div");
  convo.className = "convo";
  for (const t of active.convo) {
    const turn = document.createElement("div");
    turn.className = "turn " + t.role;
    const role = document.createElement("p");
    role.className = "role";
    role.textContent = t.role === "you" ? "You" : "AI";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = t.text;
    turn.appendChild(role);
    turn.appendChild(bubble);
    convo.appendChild(turn);
  }
  main.appendChild(convo);

  if (active.takeaway) {
    const t = document.createElement("div");
    t.className = "takeaway";
    t.innerHTML = "<strong>The point:</strong> " + active.takeaway;
    main.appendChild(t);
  }

  const footer = document.createElement("footer");
  footer.innerHTML = 'Human 101 is open source. <a href="https://github.com/zizhao-hu/human-101" target="_blank" rel="noopener">Suggest a skill on GitHub</a>.';
  main.appendChild(footer);
}

// initial route from hash
const hash = location.hash.replace("#", "");
if (hash) activeId = hash;
else activeId = SKILLS[0].skills[0].id;

render();

menuBtn.addEventListener("click", () => sidebar.classList.toggle("open"));
window.addEventListener("hashchange", () => {
  const h = location.hash.replace("#", "");
  if (h && h !== activeId) { activeId = h; render(); }
});
</script>
